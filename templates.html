<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template List | Prompt Maker</title>
    <meta name="description" content="Browse categorized templates for structured responses, ready to use and share.">
    <link rel="canonical" href="https://prompt.jctec.me/templates.html" />
    <meta property="og:title" content="Template List | Prompt Maker" />
    <meta property="og:description"
        content="Browse categorized templates for structured responses, ready to use and share." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://prompt.jctec.me/templates.html" />
    <meta property="og:image" content="https://prompt.jctec.me/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Template List | Prompt Maker" />
    <meta name="twitter:description"
        content="Browse categorized templates for structured responses, ready to use and share." />
    <meta name="twitter:image" content="https://prompt.jctec.me/og-image.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1PZLKT04SD"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-1PZLKT04SD');
    </script>
</head>

<body class="bg-gray-900 min-h-screen text-white">
    <!-- Header with navigation -->
    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4 py-2 flex items-center justify-between flex-wrap gap-y-1">
            <a href="/" class="text-base md:text-lg font-bold text-white">Prompt Maker</a>
            <nav class="flex items-center text-sm">
                <a href="/" class="text-gray-300 hover:text-blue-400 px-3">Home</a>
                <a href="/templates" class="text-blue-400 px-3 font-semibold">Templates</a>
            </nav>
        </div>
    </header>
    <main class="max-w-4xl mx-auto py-4 md:py-6 px-3 md:px-4">
        <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-2 mb-3">
            <h1 class="text-xl md:text-2xl font-bold"><span id="template-count">…</span> prompt templates</h1>
            <input id="template-search" type="search" autocomplete="off" placeholder="Search by title or category…" class="w-full sm:w-64 px-3 py-1.5 rounded bg-gray-800 text-white text-sm border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <!-- Category quick-nav: dropdown on mobile, horizontal pills on desktop -->
        <div class="sticky top-11 z-[5] -mx-3 md:-mx-4 px-3 md:px-4 py-2 mb-3 bg-gray-900 border-b border-gray-800">
            <!-- Mobile: dropdown trigger -->
            <button id="category-toggle" type="button" aria-expanded="false" aria-controls="category-dropdown" class="sm:hidden flex items-center justify-between w-full px-3 py-2.5 rounded-lg border border-gray-600 bg-gray-700 text-sm font-medium text-white hover:bg-gray-600 active:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <span class="flex items-center gap-2">
                    <svg class="w-4 h-4 text-blue-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M3 5.75A.75.75 0 0 1 3.75 5h12.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 5.75zM3 10a.75.75 0 0 1 .75-.75h12.5a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 10zm.75 3.5a.75.75 0 0 0 0 1.5h12.5a.75.75 0 0 0 0-1.5H3.75z"/></svg>
                    <span>All categories</span>
                    <span class="text-xs font-normal text-gray-300">(<span id="category-count">…</span>)</span>
                </span>
                <svg id="category-toggle-icon" class="w-5 h-5 text-blue-400 transition-transform" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 11.06l3.71-3.83a.75.75 0 1 1 1.08 1.04l-4.25 4.39a.75.75 0 0 1-1.08 0L5.21 8.27a.75.75 0 0 1 .02-1.06z" clip-rule="evenodd"/></svg>
            </button>
            <!-- Mobile: dropdown panel -->
            <div id="category-dropdown" class="hidden sm:hidden mt-2 rounded border border-gray-700 bg-gray-800 max-h-[60vh] overflow-y-auto">
                <ul id="category-nav-mobile" class="divide-y divide-gray-700 text-sm"></ul>
            </div>
            <!-- Desktop: horizontal pills -->
            <div class="hidden sm:block overflow-x-auto -mx-1 px-1" style="-webkit-overflow-scrolling: touch;">
                <div id="category-nav" class="flex gap-1.5 text-xs whitespace-nowrap"></div>
            </div>
        </div>
        <div id="template-status" class="hidden mb-3 px-3 py-2 rounded border border-red-700 bg-red-900 bg-opacity-30 text-red-200 text-xs"></div>
        <div id="template-empty" class="hidden mb-3 px-3 py-2 rounded border border-gray-700 bg-gray-800 text-gray-400 text-xs">No templates match your search.</div>
        <div id="template-list" class="space-y-4"></div>
    </main>
    <footer class="w-full py-3 flex justify-center items-center bg-gray-900 border-t border-gray-800">
        <span class="text-xs text-gray-400">
            Made with <span aria-label="love" role="img" class="mx-1">❤️</span> by
            <a href="https://jctec.me" target="_blank" rel="noopener"
                class="underline hover:text-blue-400 font-medium">jctec.me</a>
        </span>
    </footer>
    <script>
        const escape = (s) => String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        const slugify = (s) => String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'cat';
        const showError = (msg) => {
            const el = document.getElementById('template-status');
            el.textContent = msg;
            el.classList.remove('hidden');
        };
        fetch('templates.json')
            .then((response) => {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then((data) => {
                document.getElementById('template-count').textContent = data.length;
                const grouped = {};
                data.forEach((item) => {
                    if (!grouped[item.category]) grouped[item.category] = [];
                    grouped[item.category].push(item);
                });
                let html = '';
                let navHtml = '';
                let mobileNavHtml = '';
                Object.keys(grouped).forEach((cat) => {
                    const catKey = cat.toLowerCase();
                    const slug = slugify(cat);
                    const count = grouped[cat].length;
                    navHtml += `<a href="#cat-${escape(slug)}" data-nav-slug="${escape(slug)}" class="inline-block px-3 py-1.5 rounded-full border border-gray-700 bg-gray-800 text-gray-300 hover:border-blue-500 hover:text-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-500">${escape(cat)}</a>`;
                    mobileNavHtml += `<li data-nav-slug="${escape(slug)}"><a href="#cat-${escape(slug)}" class="flex items-center justify-between px-3 py-2.5 text-gray-200 hover:bg-gray-700 focus:outline-none focus:bg-gray-700"><span>${escape(cat)}</span><span class="text-xs text-gray-400">${count}</span></a></li>`;
                    html += `<section id="cat-${escape(slug)}" data-cat="${escape(catKey)}" data-slug="${escape(slug)}" style="scroll-margin-top: 7.5rem;"><h2 class="text-xs font-semibold uppercase tracking-wider text-gray-400 break-words leading-snug mb-1.5">${escape(cat)}</h2><ul class="space-y-1">`;
                    grouped[cat].forEach((tpl) => {
                        const search = (tpl.title + ' ' + cat).toLowerCase();
                        html += `<li data-search="${escape(search)}"><a href="${escape(tpl.link)}" target="_blank" rel="noopener noreferrer" class="block bg-gray-800 border border-gray-700 hover:border-blue-500 hover:bg-gray-700 rounded px-3 py-2 text-sm text-gray-100 break-words leading-snug no-underline focus:outline-none focus:ring-2 focus:ring-blue-500">${escape(tpl.title)}</a></li>`;
                    });
                    html += '</ul></section>';
                });
                document.getElementById('category-nav').innerHTML = navHtml;
                document.getElementById('category-nav-mobile').innerHTML = mobileNavHtml;
                document.getElementById('category-count').textContent = Object.keys(grouped).length;
                document.getElementById('template-list').innerHTML = html;

                // Mobile dropdown wiring
                const toggleBtn = document.getElementById('category-toggle');
                const dropdown = document.getElementById('category-dropdown');
                const toggleIcon = document.getElementById('category-toggle-icon');
                const setDropdown = (open) => {
                    dropdown.classList.toggle('hidden', !open);
                    toggleBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
                    toggleIcon.classList.toggle('rotate-180', open);
                };
                toggleBtn.addEventListener('click', () => {
                    setDropdown(dropdown.classList.contains('hidden'));
                });
                // Close after tapping a category
                dropdown.addEventListener('click', (e) => {
                    if (e.target.closest('a')) setDropdown(false);
                });
                // Close on outside click
                document.addEventListener('click', (e) => {
                    if (dropdown.classList.contains('hidden')) return;
                    if (toggleBtn.contains(e.target) || dropdown.contains(e.target)) return;
                    setDropdown(false);
                });

                const searchInput = document.getElementById('template-search');
                const emptyMsg = document.getElementById('template-empty');
                const applyFilter = () => {
                    const q = searchInput.value.trim().toLowerCase();
                    let totalVisible = 0;
                    document.querySelectorAll('#template-list section').forEach((section) => {
                        let sectionVisible = 0;
                        section.querySelectorAll('li[data-search]').forEach((li) => {
                            const matches = !q || li.dataset.search.includes(q);
                            li.classList.toggle('hidden', !matches);
                            if (matches) sectionVisible++;
                        });
                        section.classList.toggle('hidden', sectionVisible === 0);
                        const slug = section.dataset.slug;
                        document.querySelectorAll(`[data-nav-slug="${slug}"]`).forEach((el) => {
                            el.classList.toggle('hidden', sectionVisible === 0);
                        });
                        totalVisible += sectionVisible;
                    });
                    emptyMsg.classList.toggle('hidden', totalVisible !== 0);
                };
                searchInput.addEventListener('input', applyFilter);
            })
            .catch((err) => {
                document.getElementById('template-count').textContent = '0';
                showError('Could not load templates.json (' + err.message + '). Check your network and try refreshing.');
            });
    </script>
</body>

</html>
